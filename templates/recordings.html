{% extends "base.html" %}
{% block content %}
<a href="/dashboard" style="color:var(--text-secondary); text-decoration:none; font-size:14px;">← Назад на дашборд</a>
<h1 style="margin:12px 0;">📼 Записи</h1>

<!-- Фильтр -->
<div style="display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center;">
    <select id="filterCamera" onchange="loadRecordings()" style="background:#16213e; color:#fff; padding:8px; border:1px solid #333; border-radius:4px;">
        <option value="">Все камеры</option>
    </select>
    <input type="date" id="filterDate" onchange="loadRecordings()" style="background:#16213e; color:#fff; padding:8px; border:1px solid #333; border-radius:4px;">
    <button onclick="loadRecordings()" style="background:#0d47a1; color:#fff; border:none; padding:8px 16px; border-radius:4px; cursor:pointer;">🔍 Найти</button>
    <span id="recordsCount" style="color:#aaa; font-size:14px; margin-left:8px;"></span>
</div>

<!-- Кнопки массового удаления -->
<div style="margin-bottom:16px; display:flex; gap:8px; flex-wrap:wrap;">
    <button onclick="deleteFiltered()" style="background:#e65100; color:#fff; border:none; padding:8px 16px; border-radius:4px; cursor:pointer;">
        🗑️ Удалить найденные
    </button>
    <button onclick="deleteAll()" style="background:#b71c1c; color:#fff; border:none; padding:8px 16px; border-radius:4px; cursor:pointer;">
        ⚠️ Удалить ВСЕ записи
    </button>
    <span id="deleteStatus" style="color:#aaa; font-size:13px; margin-left:8px;"></span>
</div>

<!-- Таблица -->
<table style="width:100%; border-collapse:collapse;">
    <tr style="background:#16213e;">
        <th style="padding:10px; text-align:left;">Дата/Время</th>
        <th style="padding:10px; text-align:left;">Камера</th>
        <th style="padding:10px; text-align:left;">Тип</th>
        <th style="padding:10px; text-align:left;">Действия</th>
    </tr>
    <tbody id="recordingsTable">
        <tr><td colspan="4" style="color:#aaa; padding:12px;">Загрузка...</td></tr>
    </tbody>
</table>

<!-- Плеер -->
<div id="playerModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000;">
    <button onclick="closePlayer()" style="position:absolute; top:20px; right:20px; background:#e94560; color:#fff; border:none; padding:10px 16px; border-radius:6px; cursor:pointer; font-size:18px;">✕ Закрыть</button>
    <video id="playerVideo" controls style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); max-width:90%; max-height:90%;"></video>
</div>

<script>
// Загружаем список камер для фильтра
fetch('/api/cameras')
    .then(r => r.json())
    .then(d => {
        if (d.cameras) {
            d.cameras.forEach(function(cam) {
                var opt = document.createElement('option');
                opt.value = cam.id;
                opt.textContent = cam.name;
                document.getElementById('filterCamera').appendChild(opt);
            });
        }
    });

// Загружаем записи
function loadRecordings() {
    var camId = document.getElementById('filterCamera').value;
    var date = document.getElementById('filterDate').value;
    
    var url = '/api/recordings';
    var params = [];
    if (camId) params.push('camera_id=' + camId);
    if (date) params.push('date=' + date);
    if (params.length) url += '?' + params.join('&');
    
    fetch(url)
        .then(r => r.json())
        .then(d => {
            if (!d.success) return;
            
            document.getElementById('recordsCount').textContent = 'Найдено: ' + d.recordings.length;
            
            var html = '';
            d.recordings.forEach(rec => {
                html += '<tr style="border-bottom:1px solid #333;">';
                html += '<td style="padding:10px; font-size:13px;">' + (rec.start_time || '-') + '</td>';
                html += '<td style="padding:10px;">' + (rec.camera_name || rec.camera_id) + '</td>';
                html += '<td style="padding:10px;">' + (rec.type === 'motion' ? '🔴 Тревога' : '📼 Непрерывная') + '</td>';
                html += '<td style="padding:10px;">';
                html += '<button onclick="playRecording(' + rec.id + ')" style="font-size:11px; background:#0d47a1; color:#fff; border:none; padding:6px 10px; border-radius:3px; cursor:pointer; margin-right:4px;">▶</button>';
                html += '<a href="/recordings/' + rec.id + '/play" download style="font-size:11px; background:#333; color:#fff; border:none; padding:6px 10px; border-radius:3px; cursor:pointer; text-decoration:none; margin-right:4px;">⬇</a>';
                html += '<button onclick="deleteSingle(' + rec.id + ')" style="font-size:11px; background:#b71c1c; color:#fff; border:none; padding:6px 10px; border-radius:3px; cursor:pointer;">🗑️</button>';
                html += '</td></tr>';
            });
            document.getElementById('recordingsTable').innerHTML = html || '<tr><td colspan="4" style="color:#aaa; padding:12px;">Записей не найдено</td></tr>';
        });
}

// Удалить одну запись
function deleteSingle(id) {
    if (!confirm('Удалить эту запись?')) return;
    fetch('/api/recordings/' + id, { method: 'DELETE' })
        .then(r => r.json())
        .then(d => {
            if (d.success) loadRecordings();
            else alert(d.error);
        });
}

// Удалить отфильтрованные
function deleteFiltered() {
    var camId = document.getElementById('filterCamera').value;
    var date = document.getElementById('filterDate').value;
    
    var count = document.getElementById('recordsCount').textContent.match(/\d+/);
    count = count ? count[0] : '?';
    
    if (!confirm('Удалить ' + count + ' записей по текущему фильтру?')) return;
    
    var url = '/api/recordings';
    var params = [];
    if (camId) params.push('camera_id=' + camId);
    if (date) params.push('date=' + date);
    if (params.length) url += '?' + params.join('&');
    
    fetch(url, { method: 'DELETE' })
        .then(r => r.json())
        .then(d => {
            var s = document.getElementById('deleteStatus');
            if (d.success) {
                s.textContent = '✅ ' + d.message;
                s.style.color = '#4caf50';
                loadRecordings();
            } else {
                s.textContent = '❌ ' + (d.error || 'Ошибка');
                s.style.color = '#ff6b81';
            }
            setTimeout(function() { s.textContent = ''; }, 5000);
        });
}

// Удалить ВСЁ
function deleteAll() {
    var answer = prompt('Введите DELETE для подтверждения удаления ВСЕХ записей:');
    if (answer !== 'DELETE') { alert('Удаление отменено'); return; }
    
    fetch('/api/recordings?all=true', { method: 'DELETE' })
        .then(r => r.json())
        .then(d => {
            var s = document.getElementById('deleteStatus');
            if (d.success) {
                s.textContent = '✅ ' + d.message;
                s.style.color = '#4caf50';
                loadRecordings();
            } else {
                s.textContent = '❌ ' + (d.error || 'Ошибка');
                s.style.color = '#ff6b81';
            }
            setTimeout(function() { s.textContent = ''; }, 5000);
        });
}

// Плеер
function playRecording(id) {
    var modal = document.getElementById('playerModal');
    var video = document.getElementById('playerVideo');
    video.src = '/recordings/' + id + '/play';
    modal.style.display = 'block';
    video.play();
}

function closePlayer() {
    var modal = document.getElementById('playerModal');
    var video = document.getElementById('playerVideo');
    video.pause();
    video.src = '';
    modal.style.display = 'none';
}

// Загружаем при старте
loadRecordings();
</script>
{% endblock %}
