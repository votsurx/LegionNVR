{% extends "base.html" %}
{% block content %}
<a href="/settings" style="color:var(--text-secondary); text-decoration:none; font-size:14px;">← Назад в Настройки</a>
<h1 style="margin:12px 0;">🏠 Локации</h1>

<div class="card">
    <div style="display:flex; gap:8px; margin-bottom:12px;">
        <input type="text" id="newLocationName" placeholder="Название" class="input" style="flex:1;">
        <input type="text" id="newLocationIcon" placeholder="Иконка (emoji)" class="input" style="max-width:100px;" value="📍">
        <button onclick="addLocation()" class="btn btn-primary btn-sm">+ Добавить</button>
    </div>
    
    <table>
        <thead><tr><th>Иконка</th><th>Название</th><th>Действия</th></tr></thead>
        <tbody id="locationsTable"><tr><td colspan="3">Загрузка...</td></tr></tbody>
    </table>
</div>

<script>
function loadLocations(){
    fetch('/api/locations').then(r=>r.json()).then(d=>{
        if(!d.success)return;
        var h='';
        d.locations.forEach(loc=>{
            h+='<tr><td style="font-size:20px;">'+(loc.icon||'📍')+'</td><td>'+loc.name+'</td>';
            h+='<td><button onclick="editLocation('+loc.id+',\''+loc.name+'\',\''+(loc.icon||'📍')+'\')" class="btn btn-blue btn-sm">✏️</button> ';
            h+='<button onclick="deleteLocation('+loc.id+',\''+loc.name+'\')" class="btn btn-red btn-sm">🗑️</button></td></tr>';
        });
        document.getElementById('locationsTable').innerHTML=h||'<tr><td colspan="3">Нет локаций</td></tr>';
    });
}
function addLocation(){
    var n=document.getElementById('newLocationName').value.trim();
    var i=document.getElementById('newLocationIcon').value.trim()||'📍';
    if(!n)return;
    fetch('/api/locations',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,icon:i})})
    .then(r=>r.json()).then(d=>{
        if(d.success){
            document.getElementById('newLocationName').value='';
            loadLocations();
        }else{
            alert('❌ ' + (d.error || 'Ошибка'));
        }
    });
}
function editLocation(id,name,icon){
    var nn=prompt('Новое название:',name);if(!nn)return;
    var ni=prompt('Новая иконка:',icon)||icon;
    fetch('/api/locations/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:nn,icon:ni})})
    .then(r=>r.json()).then(d=>{
        if(d.success) loadLocations();
        else alert('❌ ' + (d.error || 'Ошибка'));
    });
}
function deleteLocation(id,name){
    if(!confirm('Удалить локацию «'+name+'»?\nКамеры → «Все».'))return;
    fetch('/api/locations/'+id,{method:'DELETE'}).then(r=>r.json()).then(d=>{
        if(d.success){ loadLocations(); alert(d.message); }
        else alert('❌ ' + (d.error || 'Ошибка'));
    });
}
loadLocations();
</script>
{% endblock %}
