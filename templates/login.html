{% extends "base.html" %}
{% block content %}
<div class="login-container">
    <h1>🛡️ Legion NVR</h1>
    <form method="POST" style="width:100%;">
        <input type="text" name="username" placeholder="Логин" required autofocus 
               class="input" style="font-size:18px; padding:16px; margin-bottom:16px; border-radius:12px;">
        <input type="password" name="password" placeholder="Пароль" required 
               class="input" style="font-size:18px; padding:16px; margin-bottom:16px; border-radius:12px;">
        <button type="submit" class="btn btn-primary" 
                style="width:100%; padding:16px; font-size:18px; border-radius:12px; justify-content:center;">
            Войти
        </button>
    </form>
</div>
{% endblock %}
